<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#72243E" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ANNOTTA" />
  <title>ANNOTTA</title>
  <link rel="manifest" href="/manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --borgona: #72243E;
      --borgona-claro: #9B3558;
      --crema: #FBEAF0;
      --crema-oscura: #F0D4DE;
      --texto: #3A1020;
      --muted: #A07080;
    }

    html, body {
      height: 100%;
      background: var(--crema);
      color: var(--texto);
      font-family: 'Georgia', serif;
      overscroll-behavior: none;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100dvh;
      max-width: 480px;
      margin: 0 auto;
    }

    /* ── HEADER ── */
    header {
      background: var(--borgona);
      color: var(--crema);
      padding: 14px 16px 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 { font-size: 1.3rem; letter-spacing: 0.15em; font-weight: normal; }
    header p  { font-size: 0.7rem; opacity: 0.65; letter-spacing: 0.05em; margin-top: 1px; }

    .header-left { display: flex; flex-direction: column; }

    #btn-cal {
      background: none; border: none; color: var(--crema);
      font-size: 1.3rem; cursor: pointer; padding: 4px 6px;
      opacity: 0.8; transition: opacity 0.2s;
    }
    #btn-cal:hover { opacity: 1; }

    /* ── CALENDARIO ── */
    #calendario {
      background: white;
      border-bottom: 1px solid var(--crema-oscura);
      flex-shrink: 0;
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s ease;
    }
    #calendario.abierto { max-height: 280px; }

    .cal-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 6px;
    }

    .cal-mes {
      font-size: 0.88rem; color: var(--borgona);
      font-weight: bold; letter-spacing: 0.08em; text-transform: capitalize;
    }

    .cal-btn {
      background: none; border: none; color: var(--borgona);
      font-size: 1.1rem; cursor: pointer; padding: 2px 8px;
    }

    .cal-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      padding: 0 10px 12px; gap: 2px;
    }

    .cal-dia-nombre {
      text-align: center; font-size: 0.65rem;
      color: var(--muted); padding: 4px 0; text-transform: uppercase;
    }

    .cal-dia {
      text-align: center; font-size: 0.78rem;
      padding: 5px 2px; border-radius: 50%;
      cursor: default; color: var(--texto);
      position: relative;
    }

    .cal-dia.hoy {
      background: var(--borgona); color: var(--crema);
      border-radius: 50%; font-weight: bold;
    }

    .cal-dia.tiene-evento::after {
      content: ''; display: block;
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--borgona-claro);
      margin: 1px auto 0;
    }

    .cal-dia.hoy.tiene-evento::after { background: var(--crema); }
    .cal-dia.vacio { color: transparent; }

    /* ── ENTRADA ── */
    .entrada-wrap {
      padding: 12px 16px 0;
      background: var(--crema);
      flex-shrink: 0;
    }

    #entrada {
      width: 100%; min-height: 90px;
      padding: 12px 14px;
      background: white;
      border: 1.5px solid var(--crema-oscura);
      border-radius: 12px;
      font-family: 'Georgia', serif; font-size: 1rem;
      color: var(--texto); resize: none; outline: none; line-height: 1.6;
      transition: border-color 0.2s;
    }
    #entrada:focus { border-color: var(--borgona); }
    #entrada::placeholder { color: var(--muted); font-style: italic; }

    .botones { display: flex; gap: 10px; margin-top: 8px; }

    #btn-guardar {
      flex: 1; padding: 11px;
      background: var(--borgona); color: var(--crema);
      border: none; border-radius: 10px;
      font-family: 'Georgia', serif; font-size: 0.95rem;
      letter-spacing: 0.05em; cursor: pointer; transition: background 0.2s;
    }
    #btn-guardar:active { background: var(--borgona-claro); }
    #btn-guardar:disabled { opacity: 0.6; }

    /* ── ESTADO / BANNERS ── */
    #estado {
      min-height: 20px; font-size: 0.78rem; color: var(--muted);
      padding: 6px 16px 4px; font-style: italic; flex-shrink: 0;
    }

    #banners { flex-shrink: 0; padding: 0 16px; }

    .banner {
      background: var(--borgona); color: var(--crema);
      border-radius: 10px; padding: 9px 12px;
      font-size: 0.8rem; line-height: 1.5;
      display: flex; gap: 8px; align-items: flex-start;
      margin-bottom: 6px;
    }
    .banner span { flex: 1; }
    .banner-cerrar {
      background: none; border: none; color: var(--crema);
      font-size: 1.1rem; cursor: pointer; opacity: 0.7;
    }

    /* ── SECCIONES ── */
    .secciones {
      flex: 1; overflow-y: auto;
      padding: 6px 16px 24px;
      display: flex; flex-direction: column; gap: 12px;
    }

    .seccion {
      background: white; border-radius: 12px;
      border-left: 4px solid var(--borgona); overflow: hidden;
    }

    .seccion-header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 9px 14px; background: var(--crema-oscura);
      cursor: pointer; user-select: none;
    }

    .seccion-header h2 {
      font-size: 0.8rem; letter-spacing: 0.12em;
      font-weight: bold; color: var(--borgona); text-transform: uppercase;
    }

    .seccion-count { font-size: 0.72rem; color: var(--muted); }

    .seccion-cuerpo { display: flex; flex-direction: column; }

    /* ── NOTA ── */
    .nota {
      padding: 10px 14px; font-size: 0.88rem; line-height: 1.5;
      border-bottom: 1px solid var(--crema-oscura);
      display: flex; gap: 8px; align-items: flex-start;
    }
    .nota:last-child { border-bottom: none; }

    .nota-texto { flex: 1; }

    .nota-meta {
      display: flex; flex-direction: column; align-items: flex-end; gap: 4px;
      flex-shrink: 0;
    }

    .nota-fecha {
      font-size: 0.67rem; color: var(--muted); white-space: nowrap;
    }

    .nota-acciones { display: flex; gap: 4px; }

    .nota-btn {
      background: none; border: none; color: var(--muted);
      font-size: 0.9rem; cursor: pointer; padding: 1px 3px; line-height: 1;
    }
    .nota-btn:hover { color: var(--borgona); }

    /* ── MODO EDICIÓN ── */
    .nota.editando { flex-direction: column; gap: 8px; background: #fffaf9; }

    .nota-edit-area {
      width: 100%; padding: 8px 10px;
      border: 1.5px solid var(--borgona); border-radius: 8px;
      font-family: 'Georgia', serif; font-size: 0.88rem;
      color: var(--texto); line-height: 1.5; resize: none; outline: none;
      background: white; min-height: 56px;
    }

    .nota-edit-acciones { display: flex; gap: 8px; }

    .btn-confirmar {
      flex: 1; padding: 7px;
      background: var(--borgona); color: var(--crema);
      border: none; border-radius: 7px;
      font-family: 'Georgia', serif; font-size: 0.82rem; cursor: pointer;
    }
    .btn-cancelar {
      padding: 7px 14px;
      background: var(--crema-oscura); color: var(--muted);
      border: none; border-radius: 7px;
      font-family: 'Georgia', serif; font-size: 0.82rem; cursor: pointer;
    }

    .seccion-vacia {
      padding: 11px 14px; font-size: 0.82rem;
      color: var(--muted); font-style: italic;
    }

    /* ── COMPRAS ── */
    .compras-subheader {
      display: flex; justify-content: space-between; align-items: center;
      padding: 7px 14px; background: #fdf4f7;
      border-bottom: 1px solid var(--crema-oscura);
    }

    .compras-subheader h3 {
      font-size: 0.75rem; letter-spacing: 0.08em;
      color: var(--borgona-claro); text-transform: uppercase;
    }

    .compras-item {
      padding: 9px 14px; font-size: 0.86rem; line-height: 1.4;
      border-bottom: 1px solid var(--crema-oscura);
      display: flex; align-items: center; gap: 10px;
    }
    .compras-item:last-child { border-bottom: none; }

    .compras-check {
      width: 18px; height: 18px; flex-shrink: 0;
      border: 1.5px solid var(--crema-oscura); border-radius: 4px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 0.7rem; color: var(--borgona); transition: all 0.15s;
    }
    .compras-check.marcado {
      background: var(--borgona); border-color: var(--borgona); color: var(--crema);
    }

    .compras-texto { flex: 1; }
    .compras-texto.tachado { text-decoration: line-through; color: var(--muted); }

    .btn-add-cat {
      background: none; border: none; color: var(--muted);
      font-size: 0.78rem; cursor: pointer; padding: 0;
    }
    .btn-add-cat:hover { color: var(--borgona); }

    .compras-nueva-cat {
      padding: 8px 14px; border-bottom: 1px solid var(--crema-oscura);
      display: flex; gap: 8px;
    }

    .compras-nueva-cat input {
      flex: 1; padding: 5px 8px;
      border: 1px solid var(--crema-oscura); border-radius: 6px;
      font-family: 'Georgia', serif; font-size: 0.82rem; outline: none;
    }
    .compras-nueva-cat input:focus { border-color: var(--borgona); }

    .btn-mini {
      padding: 5px 10px; background: var(--borgona);
      color: var(--crema); border: none; border-radius: 6px;
      font-size: 0.75rem; cursor: pointer;
    }

    /* ── BOTTOM SHEET ── */
    #overlay {
      position: fixed; inset: 0; background: rgba(58,16,32,0.35);
      z-index: 100; display: none; align-items: flex-end;
    }
    #overlay.visible { display: flex; }

    .sheet {
      background: white; width: 100%; max-width: 480px;
      margin: 0 auto; border-radius: 18px 18px 0 0;
      padding: 20px 20px 32px; max-height: 70vh; overflow-y: auto;
    }

    .sheet h3 {
      font-size: 0.9rem; color: var(--borgona);
      margin-bottom: 14px; line-height: 1.4;
    }

    .sheet-btns { display: flex; gap: 10px; margin-top: 4px; }

    .sheet-btn-si {
      flex: 1; padding: 11px;
      background: var(--borgona); color: var(--crema);
      border: none; border-radius: 9px;
      font-family: 'Georgia', serif; font-size: 0.9rem; cursor: pointer;
    }
    .sheet-btn-no {
      flex: 1; padding: 11px;
      background: var(--crema-oscura); color: var(--texto);
      border: none; border-radius: 9px;
      font-family: 'Georgia', serif; font-size: 0.9rem; cursor: pointer;
    }

    .cat-lista { display: flex; flex-direction: column; gap: 6px; margin-top: 4px; }

    .cat-opcion {
      padding: 10px 14px; background: var(--crema);
      border-radius: 8px; border: 1px solid var(--crema-oscura);
      font-size: 0.88rem; cursor: pointer; text-align: left;
      font-family: 'Georgia', serif;
    }
    .cat-opcion:hover { border-color: var(--borgona); color: var(--borgona); }

    /* ── SPINNER ── */
    .spinner {
      display: inline-block; width: 11px; height: 11px;
      border: 2px solid var(--crema-oscura);
      border-top-color: var(--borgona); border-radius: 50%;
      animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 4px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="header-left">
      <h1>ANNOTTA</h1>
      <p>tu cerebro externo</p>
    </div>
    <button id="btn-cal" title="Calendario">📅</button>
  </header>

  <div id="calendario">
    <div class="cal-nav">
      <button class="cal-btn" id="cal-prev">‹</button>
      <span class="cal-mes" id="cal-titulo"></span>
      <button class="cal-btn" id="cal-next">›</button>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <div class="entrada-wrap">
    <textarea
      id="entrada"
      placeholder="Escribe cualquier cosa… la IA lo clasifica sola."
      autocomplete="off" autocorrect="on" spellcheck="true"
    ></textarea>
    <div class="botones">
      <button id="btn-guardar">Guardar</button>
    </div>
  </div>

  <div id="estado"></div>
  <div id="banners"></div>

  <div class="secciones" id="secciones"></div>
</div>

<!-- Bottom sheet para confirmación de Compras -->
<div id="overlay">
  <div class="sheet" id="sheet"></div>
</div>

<script>
// ══════════════════════════════════════════
// CONSTANTES Y ESTADO
// ══════════════════════════════════════════

const CATEGORIAS_NOTAS = ['Salud', 'Pendientes', 'Eventos', 'Diario'];
const STORAGE_KEY   = 'annotta_notas';
const COMPRAS_KEY   = 'annotta_compras';
const NOTIF_KEY     = 'annotta_notificaciones';

const ICONOS = { Salud: '♡', Pendientes: '○', Eventos: '◇', Diario: '✦', Compras: '✿' };

let notas   = cargarNotas();
let compras = cargarCompras();

// ── DOM ──
const entrada    = document.getElementById('entrada');
const btnGuardar = document.getElementById('btn-guardar');
const estadoEl   = document.getElementById('estado');
const seccionesEl = document.getElementById('secciones');
const bannersEl  = document.getElementById('banners');
const overlay    = document.getElementById('overlay');
const sheet      = document.getElementById('sheet');
const calendario = document.getElementById('calendario');
const btnCal     = document.getElementById('btn-cal');

// ── FOCUS ──
setTimeout(() => entrada.focus(), 300);

// ── ENTER guarda, Shift+Enter = salto ──
entrada.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); guardar(); }
});
btnGuardar.addEventListener('click', guardar);

// ══════════════════════════════════════════
// GUARDAR
// ══════════════════════════════════════════

async function guardar() {
  const texto = entrada.value.trim();
  if (!texto) return;

  setEstado('<span class="spinner"></span> Clasificando…');
  btnGuardar.disabled = true;

  let items = [{ texto, categoria: 'Diario' }];

  try {
    const ctrl = new AbortController();
    const tOut = setTimeout(() => ctrl.abort(), 8000);
    const resp = await fetch('/api/clasificar', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto, subcategorias: compras.categorias }),
      signal: ctrl.signal
    });
    clearTimeout(tOut);
    if (resp.ok) {
      const data = await resp.json();
      if (Array.isArray(data.items) && data.items.length) items = data.items;
    }
  } catch { /* sin conexión o timeout: guarda como Diario */ }

  btnGuardar.disabled = false;
  setEstado('');
  entrada.value = '';

  // Ítem único no-Compras → guardar directo sin sheet
  if (items.length === 1 && items[0].categoria !== 'Compras') {
    guardarItem(items[0]);
    const cat = items[0].categoria;
    setEstado(`Guardado en <strong>${cat}</strong>`);
    setTimeout(() => setEstado(''), 2500);
    entrada.focus();
    return;
  }

  // Múltiples ítems o Compras → mostrar sheet de confirmación
  confirmarItems(items);
  entrada.focus();
}

// Guarda un ítem individual en su sección correspondiente
function guardarItem(it) {
  if (it.categoria === 'Compras') {
    agregarItemCompra(it.texto, it.subcategoria || compras.categorias[0],
      it.subcategoria && !compras.categorias.includes(it.subcategoria));
    return;
  }
  const ahora = new Date();
  const nota = {
    id: Date.now() + Math.random(), // evitar colisiones en guardado múltiple
    texto: it.texto,
    categoria: it.categoria,
    fecha: formatearFechaHora(ahora),
    fechaISO: ahora.toISOString()
  };
  notas.push(nota);
  guardarNotas();
  if (it.categoria === 'Eventos') procesarEventoNuevo(nota.id, it.texto, nota.fecha);
}

// ══════════════════════════════════════════
// RENDER NOTAS
// ══════════════════════════════════════════

function renderSecciones() {
  seccionesEl.innerHTML = '';

  CATEGORIAS_NOTAS.forEach(cat => {
    const items = notas.filter(n => n.categoria === cat).reverse();
    const sec = crearSeccion(cat, items.length);

    const cuerpo = document.createElement('div');
    cuerpo.className = 'seccion-cuerpo';

    if (!items.length) {
      cuerpo.innerHTML = `<p class="seccion-vacia">Nada por aquí todavía.</p>`;
    } else {
      items.forEach(nota => cuerpo.appendChild(crearNotaEl(nota)));
    }

    sec.appendChild(cuerpo);
    seccionesEl.appendChild(sec);
  });

  seccionesEl.appendChild(crearSeccionCompras());
}

function crearSeccion(cat, count) {
  const sec = document.createElement('div');
  sec.className = 'seccion';
  const header = document.createElement('div');
  header.className = 'seccion-header';
  header.innerHTML = `<h2>${ICONOS[cat] || '·'} ${cat}</h2><span class="seccion-count">${count}</span>`;
  sec.appendChild(header);
  return sec;
}

function crearNotaEl(nota) {
  const div = document.createElement('div');
  div.className = 'nota';
  div.dataset.id = nota.id;

  // Solo Salud muestra la hora
  const fechaDisplay = nota.categoria === 'Salud'
    ? nota.fecha
    : (nota.fecha || '').split(' — ')[0];

  div.innerHTML = `
    <span class="nota-texto">${escapeHtml(nota.texto)}</span>
    <div class="nota-meta">
      <span class="nota-fecha">${fechaDisplay}</span>
      <div class="nota-acciones">
        <button class="nota-btn" title="Editar">✎</button>
        <button class="nota-btn" title="Eliminar">×</button>
      </div>
    </div>
  `;

  div.querySelectorAll('.nota-btn')[0].addEventListener('click', () => activarEdicion(div, nota));
  div.querySelectorAll('.nota-btn')[1].addEventListener('click', () => {
    notas = notas.filter(n => n.id !== nota.id);
    guardarNotas();
    renderSecciones();
  });

  return div;
}

function activarEdicion(div, nota) {
  const fechaDisplay = nota.categoria === 'Salud'
    ? nota.fecha
    : (nota.fecha || '').split(' — ')[0];

  div.className = 'nota editando';
  div.innerHTML = `
    <textarea class="nota-edit-area">${escapeHtml(nota.texto)}</textarea>
    <div class="nota-edit-acciones">
      <button class="btn-cancelar">Cancelar</button>
      <button class="btn-confirmar">Guardar</button>
    </div>
    <span class="nota-fecha">${fechaDisplay}</span>
  `;

  const area = div.querySelector('.nota-edit-area');
  area.focus();
  area.setSelectionRange(area.value.length, area.value.length);

  div.querySelector('.btn-cancelar').addEventListener('click', () => {
    div.replaceWith(crearNotaEl(nota));
  });

  div.querySelector('.btn-confirmar').addEventListener('click', () => {
    const nuevo = area.value.trim();
    if (!nuevo) return;
    const idx = notas.findIndex(n => n.id === nota.id);
    if (idx !== -1) { notas[idx].texto = nuevo; guardarNotas(); renderSecciones(); }
  });
}

// ══════════════════════════════════════════
// COMPRAS
// ══════════════════════════════════════════

function cargarCompras() {
  try {
    const raw = JSON.parse(localStorage.getItem(COMPRAS_KEY));
    if (raw && raw.categorias) {
      return { categorias: raw.categorias, items: Array.isArray(raw.items) ? raw.items : [] };
    }
  } catch {}
  return {
    categorias: ['Comestibles', 'Frutas y Verduras', 'Perfumería', 'Limpieza', 'Ferretería', 'Farmacia'],
    items: []
  };
}

function guardarCompras() {
  localStorage.setItem(COMPRAS_KEY, JSON.stringify(compras));
}

function crearSeccionCompras() {
  const total = compras.items.filter(i => !i.comprado).length;
  const sec = crearSeccion('Compras', total);

  const cuerpo = document.createElement('div');
  cuerpo.className = 'seccion-cuerpo';

  if (!compras.categorias.length && !compras.items.length) {
    cuerpo.innerHTML = `<p class="seccion-vacia">Nada por aquí todavía.</p>`;
  } else {
    compras.categorias.forEach(cat => {
      const items = compras.items.filter(i => i.categoria === cat);
      const sub = document.createElement('div');
      sub.innerHTML = `
        <div class="compras-subheader">
          <h3>${cat}</h3>
        </div>
      `;
      if (!items.length) {
        sub.innerHTML += `<p class="seccion-vacia" style="padding:8px 14px;font-size:0.78rem;">Vacío</p>`;
      } else {
        items.forEach(item => sub.appendChild(crearItemCompra(item)));
      }
      cuerpo.appendChild(sub);
    });
  }

  // Botón agregar categoría
  const addCatWrap = document.createElement('div');
  addCatWrap.style.cssText = 'padding:8px 14px;';
  addCatWrap.innerHTML = `<button class="btn-add-cat">+ Agregar categoría</button>`;
  addCatWrap.querySelector('button').addEventListener('click', () => mostrarInputNuevaCat(addCatWrap));
  cuerpo.appendChild(addCatWrap);

  sec.appendChild(cuerpo);
  return sec;
}

function crearItemCompra(item) {
  const div = document.createElement('div');
  div.className = 'compras-item';
  div.innerHTML = `
    <div class="compras-check${item.comprado ? ' marcado' : ''}">
      ${item.comprado ? '✓' : ''}
    </div>
    <span class="compras-texto${item.comprado ? ' tachado' : ''}">${escapeHtml(item.texto)}</span>
    <button class="nota-btn" title="Eliminar">×</button>
  `;

  div.querySelector('.compras-check').addEventListener('click', () => {
    const idx = compras.items.findIndex(i => i.id === item.id);
    if (idx !== -1) {
      compras.items[idx].comprado = !compras.items[idx].comprado;
      guardarCompras();
      renderSecciones();
    }
  });

  div.querySelector('.nota-btn').addEventListener('click', () => {
    compras.items = compras.items.filter(i => i.id !== item.id);
    guardarCompras();
    renderSecciones();
  });

  return div;
}

function mostrarInputNuevaCat(wrapper) {
  const div = document.createElement('div');
  div.className = 'compras-nueva-cat';
  div.innerHTML = `<input type="text" placeholder="Nombre de la categoría" maxlength="40" /><button class="btn-mini">OK</button>`;
  wrapper.replaceWith(div);

  const input = div.querySelector('input');
  input.focus();

  div.querySelector('button').addEventListener('click', () => {
    const nombre = input.value.trim();
    if (nombre && !compras.categorias.includes(nombre)) {
      compras.categorias.push(nombre);
      guardarCompras();
      renderSecciones();
    }
  });

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') div.querySelector('button').click();
  });
}

// ── BOTTOM SHEET: confirmación de subcategoría ──
const CAT_COLOR = { Salud:'#C0435A', Pendientes:'#7A5C8A', Eventos:'#4A7A9B', Diario:'#8A7A5A', Compras:'#5A8A5A' };

// items = [{ texto, categoria, subcategoria? }]
function confirmarItems(items) {
  // Estado mutable de cada ítem
  const estado = items.map(it => ({
    texto: it.texto,
    categoria: it.categoria || 'Diario',
    subcat: it.categoria === 'Compras'
      ? (it.subcategoria || compras.categorias[0])
      : (it.subcategoria || null)
  }));

  mostrarSheet(() => {
    sheet.innerHTML = `
      <h3 style="margin-bottom:14px;">¿Así lo guardo?</h3>
      <div id="sheet-items"></div>
      <div class="sheet-btns" style="margin-top:16px;">
        <button class="sheet-btn-no">Cancelar</button>
        <button class="sheet-btn-si">Confirmar todo</button>
      </div>
    `;

    const contenedor = sheet.querySelector('#sheet-items');

    estado.forEach((it, idx) => {
      const fila = document.createElement('div');
      fila.style.cssText = 'display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap;';

      // Badge de categoría
      const badge = document.createElement('span');
      badge.textContent = ICONOS[it.categoria] + ' ' + it.categoria;
      badge.style.cssText = `font-size:0.72rem;padding:2px 7px;border-radius:12px;background:${CAT_COLOR[it.categoria] || '#888'};color:white;white-space:nowrap;`;
      fila.appendChild(badge);

      // Texto del ítem
      const txt = document.createElement('span');
      txt.textContent = it.texto;
      txt.style.cssText = 'flex:1;font-size:0.88rem;min-width:80px;';
      fila.appendChild(txt);

      // Selector de subcategoría solo para Compras
      if (it.categoria === 'Compras') {
        const sel = document.createElement('select');
        sel.style.cssText = 'padding:4px 6px;border:1px solid var(--crema-oscura);border-radius:7px;font-family:Georgia,serif;font-size:0.78rem;color:var(--borgona);outline:none;background:white;max-width:130px;';
        compras.categorias.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c; opt.textContent = c;
          if (c === it.subcat) opt.selected = true;
          sel.appendChild(opt);
        });
        // Si la subcategoría sugerida es nueva, agregarla como opción
        if (it.subcat && !compras.categorias.includes(it.subcat)) {
          const opt = document.createElement('option');
          opt.value = it.subcat; opt.textContent = it.subcat + ' ✦';
          opt.selected = true;
          sel.appendChild(opt);
        }
        sel.addEventListener('change', e => { estado[idx].subcat = e.target.value; });
        fila.appendChild(sel);
      }

      contenedor.appendChild(fila);
    });

    sheet.querySelector('.sheet-btn-si').addEventListener('click', () => {
      estado.forEach(it => guardarItem(it));
      renderSecciones();
      cerrarSheet();
      setEstado(`✓ ${estado.length} ítem${estado.length > 1 ? 's' : ''} guardado${estado.length > 1 ? 's' : ''}`);
      setTimeout(() => setEstado(''), 2500);
    });

    sheet.querySelector('.sheet-btn-no').addEventListener('click', cerrarSheet);
  });
}

function agregarItemCompra(texto, categoria, crearCategoria) {
  if (crearCategoria && !compras.categorias.includes(categoria)) {
    compras.categorias.push(categoria);
  }
  compras.items.push({
    id: Date.now(),
    texto,
    categoria,
    comprado: false,
    fecha: formatearFechaHora(new Date()).split(' — ')[0]
  });
  guardarCompras();
  renderSecciones();
  entrada.focus();
}

function mostrarSheet(fn) {
  overlay.classList.add('visible');
  fn();
}

function cerrarSheet() {
  overlay.classList.remove('visible');
  sheet.innerHTML = '';
}

overlay.addEventListener('click', e => { if (e.target === overlay) cerrarSheet(); });

// ══════════════════════════════════════════
// CALENDARIO
// ══════════════════════════════════════════

let calFecha = new Date();

btnCal.addEventListener('click', () => {
  calendario.classList.toggle('abierto');
  if (calendario.classList.contains('abierto')) renderCalendario();
});

document.getElementById('cal-prev').addEventListener('click', () => {
  calFecha.setMonth(calFecha.getMonth() - 1);
  renderCalendario();
});

document.getElementById('cal-next').addEventListener('click', () => {
  calFecha.setMonth(calFecha.getMonth() + 1);
  renderCalendario();
});

function renderCalendario() {
  const hoy   = new Date();
  const anio  = calFecha.getFullYear();
  const mes   = calFecha.getMonth();

  document.getElementById('cal-titulo').textContent =
    new Date(anio, mes, 1).toLocaleDateString('es-AR', { month: 'long', year: 'numeric' });

  // Días con eventos
  const diasConEvento = new Set();
  notas.filter(n => n.categoria === 'Eventos' && n.fechaISO).forEach(n => {
    const d = new Date(n.fechaISO);
    if (d.getFullYear() === anio && d.getMonth() === mes) {
      diasConEvento.add(d.getDate());
    }
  });

  const grid = document.getElementById('cal-grid');
  grid.innerHTML = '';

  const dias = ['Lu', 'Ma', 'Mi', 'Ju', 'Vi', 'Sa', 'Do'];
  dias.forEach(d => {
    const el = document.createElement('div');
    el.className = 'cal-dia-nombre';
    el.textContent = d;
    grid.appendChild(el);
  });

  // Primer día del mes (0=dom, ajustamos a lunes=0)
  const primerDia = new Date(anio, mes, 1).getDay();
  const offset = primerDia === 0 ? 6 : primerDia - 1;
  for (let i = 0; i < offset; i++) {
    const el = document.createElement('div');
    el.className = 'cal-dia vacio';
    el.textContent = '.';
    grid.appendChild(el);
  }

  const diasEnMes = new Date(anio, mes + 1, 0).getDate();
  for (let d = 1; d <= diasEnMes; d++) {
    const el = document.createElement('div');
    el.className = 'cal-dia';
    el.textContent = d;
    if (d === hoy.getDate() && mes === hoy.getMonth() && anio === hoy.getFullYear()) {
      el.classList.add('hoy');
    }
    if (diasConEvento.has(d)) el.classList.add('tiene-evento');
    grid.appendChild(el);
  }
}

// ══════════════════════════════════════════
// NOTIFICACIONES DE EVENTOS
// ══════════════════════════════════════════

async function pedirPermisoNotif() {
  if (!('Notification' in window)) return false;
  if (Notification.permission === 'granted') return true;
  if (Notification.permission === 'denied') return false;
  return (await Notification.requestPermission()) === 'granted';
}

async function mostrarNotificacion(titulo, cuerpo) {
  if (Notification.permission !== 'granted') return;
  try {
    const reg = await navigator.serviceWorker.ready;
    reg.showNotification(titulo, {
      body: cuerpo,
      icon: '/icons/icon-192.png',
      vibrate: [200, 100, 200],
      tag: titulo
    });
  } catch {
    new Notification(titulo, { body: cuerpo });
  }
}

function programarAlarmas(id, nombre, fechaISO) {
  const fechaEvento = new Date(fechaISO);
  if (isNaN(fechaEvento.getTime())) return false;

  const diaPrevio = new Date(fechaEvento);
  diaPrevio.setDate(diaPrevio.getDate() - 1);
  diaPrevio.setHours(20, 0, 0, 0);

  const unaHoraAntes = new Date(fechaEvento.getTime() - 60 * 60 * 1000);

  const ahora     = Date.now();
  const MAX_DELAY = 2147483647;
  const lista     = JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]')
    .filter(n => n.eventoId !== id);

  let programadas = 0;

  [[diaPrevio, 'dia-previo', `Mañana: ${nombre}`, 'Tenés un evento mañana.'],
   [unaHoraAntes, 'una-hora', `En 1 hora: ${nombre}`, 'Tu evento empieza en 1 hora.']
  ].forEach(([fecha, tipo, titulo, cuerpo]) => {
    const delay = fecha.getTime() - ahora;
    if (delay > 0) {
      lista.push({ eventoId: id, tipo, titulo, cuerpo, dispararEn: fecha.toISOString(), disparado: false });
      if (delay <= MAX_DELAY) {
        setTimeout(async () => {
          await mostrarNotificacion(titulo, cuerpo);
          const l = JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]');
          const i = l.findIndex(x => x.eventoId === id && x.tipo === tipo);
          if (i !== -1) { l[i].disparado = true; localStorage.setItem(NOTIF_KEY, JSON.stringify(l)); }
        }, delay);
      }
      programadas++;
    }
  });

  localStorage.setItem(NOTIF_KEY, JSON.stringify(lista));
  return programadas > 0;
}

async function procesarEventoNuevo(id, texto, fechaMostrada) {
  const permiso = await pedirPermisoNotif();
  if (!permiso) {
    setEstado('⚠ Activá las notificaciones para recibir alarmas');
    setTimeout(() => setEstado(''), 3000);
    return;
  }

  setEstado('<span class="spinner"></span> Detectando fecha del evento…');

  try {
    const resp = await fetch('/api/extraer-fecha', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ texto })
    });

    if (!resp.ok) throw new Error('sin respuesta');
    const data = await resp.json();

    if (data.error || !data.fechaISO) {
      setEstado('ℹ No encontré fecha en el evento — agregala manualmente');
      setTimeout(() => setEstado(''), 3000);
      return;
    }

    const ok = programarAlarmas(id, data.nombre || texto.slice(0, 40), data.fechaISO);
    if (ok) {
      setEstado(`🔔 Alarmas programadas para <strong>${escapeHtml(data.nombre || 'el evento')}</strong>`);
    } else {
      setEstado('ℹ El evento ya pasó — no se programaron alarmas');
    }
  } catch {
    setEstado('⚠ Sin conexión — alarmas no programadas');
  }

  setTimeout(() => setEstado(''), 4000);
}

function revisarNotificacionesPerdidas() {
  const ahora = Date.now();
  const lista  = JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]');
  let cambios  = false;

  lista.forEach(n => {
    if (!n.disparado && new Date(n.dispararEn).getTime() < ahora) {
      mostrarBanner(`⏰ ${n.titulo}`);
      n.disparado = true;
      cambios = true;
    }
  });

  if (cambios) localStorage.setItem(NOTIF_KEY, JSON.stringify(lista));
}

function reactivarTimeouts() {
  const ahora    = Date.now();
  const MAX      = 2147483647;
  const lista    = JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]');

  lista.filter(n => !n.disparado).forEach(n => {
    const delay = new Date(n.dispararEn).getTime() - ahora;
    if (delay > 0 && delay <= MAX) {
      setTimeout(async () => {
        await mostrarNotificacion(n.titulo, n.cuerpo);
        const l = JSON.parse(localStorage.getItem(NOTIF_KEY) || '[]');
        const i = l.findIndex(x => x.eventoId === n.eventoId && x.tipo === n.tipo);
        if (i !== -1) { l[i].disparado = true; localStorage.setItem(NOTIF_KEY, JSON.stringify(l)); }
      }, delay);
    }
  });
}

function mostrarBanner(msg) {
  const div = document.createElement('div');
  div.className = 'banner';
  div.innerHTML = `<span>${escapeHtml(msg)}</span><button class="banner-cerrar">×</button>`;
  div.querySelector('.banner-cerrar').addEventListener('click', () => div.remove());
  bannersEl.appendChild(div);
}

// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════

function formatearFechaHora(d) {
  const fecha = d.toLocaleDateString('es-AR', { day: '2-digit', month: '2-digit', year: 'numeric' });
  const hora  = d.toLocaleTimeString('es-AR', { hour: '2-digit', minute: '2-digit', hour12: false });
  return `${fecha} — ${hora} hs`;
}

function setEstado(html) { estadoEl.innerHTML = html; }

function cargarNotas() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function guardarNotas() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(notas));
}

function escapeHtml(str) {
  return String(str)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── SERVICE WORKER ──
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js');
}

// ── INICIO ──
try { revisarNotificacionesPerdidas(); } catch {}
try { reactivarTimeouts(); } catch {}
try { renderSecciones(); } catch(e) { console.error('renderSecciones:', e); }
try { renderCalendario(); } catch {}
